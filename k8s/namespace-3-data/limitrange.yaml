apiVersion: v1
kind: LimitRange
metadata:
  name: data-limitrange
  namespace: data
spec:
  limits:
    - type: Container
      default:
        memory: "256Mi"
        cpu: "200m"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: "1Gi"
        cpu: "1"
      min:
        memory: "32Mi"
        cpu: "10m"
