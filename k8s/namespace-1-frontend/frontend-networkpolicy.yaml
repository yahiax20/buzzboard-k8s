apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: frontend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept from anywhere (Traefik ingress controller)
    - {}
  egress:
    # Allow all outbound (browser makes API calls, nginx needs DNS)
    - {}
