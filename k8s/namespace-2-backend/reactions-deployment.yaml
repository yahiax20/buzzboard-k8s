apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactions
  namespace: backend
  labels:
    app: reactions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reactions
  template:
    metadata:
      labels:
        app: reactions
        tier: backend
    spec:
      containers:
        - name: reactions
          image: yahiaxx20/buzzboard-reactions:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reactions-secret
                  key: redis-password
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reactions-secret
                  key: mysql-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: MYSQL_DATABASE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: reactions-secret
                  key: jwt-secret
            - name: MOOD_SVC_URL
              valueFrom:
                configMapKeyRef:
                  name: reactions-config
                  key: MOOD_SVC_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
