prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # Watch ALL namespaces for rules and monitors
    ruleNamespaceSelector: {}
    ruleSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'Your_Gmail'
      smtp_auth_username: 'Your_Gmail'
      smtp_auth_password: 'App-Password'
      smtp_require_tls: true
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'instance']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'gmail-receiver'
      routes:
        - match:
            severity: critical
          receiver: 'gmail-receiver'
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'gmail-receiver'
          repeat_interval: 6h
    receivers:
      - name: 'gmail-receiver'
        email_configs:
          - to: 'Your_Gmail'
            send_resolved: true
            headers:
              Subject: >-
                [BuzzBoard {{ .Status | toUpper }}]
                {{ .GroupLabels.alertname }}
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'instance']

grafana:
  adminPassword: "buzzboard-grafana-admin"
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - grafana.buzzboard.local
    path: /
    tls:
      - secretName: buzzboard-tls-secret
        hosts:
          - grafana.buzzboard.local

nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "50m"

kubeStateMetrics:
  enabled: true

defaultRules:
  create: false
  rules:
    alertmanager: true
    etcd: false
    general: true
    k8s: true
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

    kubeProxy:
  enabled: false

kubeScheduler:
  enabled: false

kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false
